services:
  - type: web
    name: health-sphere-backend
    runtime: python
    rootDir: MainAdminTest/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FRONTEND_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
